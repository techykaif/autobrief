name: RSS Scraper Automation

on:
  schedule:
    - cron: "7,37 * * * *" # Every 30 minutes
  workflow_dispatch: # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run RSS scraper
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: npx tsx scripts/rss/rssScraper.ts

      - name: Export posts to JSON
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: npx tsx scripts/export-posts.ts

      - name: Checkout data branch (create if missing)
        run: |
          git fetch origin data || true
          git checkout data 2>/dev/null || git checkout --orphan data
          # If orphan branch, remove everything except data/
          if ! git show-ref --verify --quiet refs/heads/data; then
            git rm -rf . --quiet 2>/dev/null || true
          fi

      - name: Copy posts.json to data branch
        run: |
          # Switch back to main to grab the file, then apply to data branch
          git checkout main -- data/posts.json

      - name: Commit and force push to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          # Only commit if there are changes
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update posts.json [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
          git push origin data --force

      - name: Trigger Netlify rebuild
        if: env.NETLIFY_BUILD_HOOK != ''
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: curl -s -X POST "$NETLIFY_BUILD_HOOK"
