name: Export Posts & Deploy

on:
  workflow_dispatch:
    inputs:
      articles_count:
        description: "Number of articles processed"
        required: false
        default: "0"

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Export posts to JSON
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: npx tsx scripts/export/export-posts.ts

      - name: Commit posts.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          ARTICLE_COUNT="${{ github.event.inputs.articles_count }}"
          git commit -m "data: update posts.json (+${ARTICLE_COUNT} articles) [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
          git push origin main

      - name: Trigger Vercel rebuild
        if: env.VERCEL_DEPLOY_HOOK != ''
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          echo "🚀 Triggering Vercel rebuild..."
          curl -s -X POST "$VERCEL_DEPLOY_HOOK"
          echo "✅ Vercel rebuild triggered"
